# ============================================================
# Cerberus — Docker Compose for local development
# ============================================================
# Runs: neo4j-mcp server + backend + frontend dev server
#
# Neo4j itself runs on Aura (cloud) — not in this compose file.
# The neo4j-mcp server bridges between the backend and Aura.
#
# Usage:
#   cp .env.example .env  # fill in your Aura credentials
#   docker compose up
# ============================================================

services:
  # ── neo4j-mcp server ─────────────────────────────────────────
  # Bridges the FastAPI backend (and RocketRide) to Neo4j Aura.
  # Exposes tools: get-schema, read-cypher, write-cypher
  # Runs in HTTP mode (not stdio) so backend can reach it.
  neo4j-mcp:
    image: alpine:latest
    container_name: cerberus-neo4j-mcp
    ports:
      - "8787:8787"
    volumes:
      # Pre-built binary for macOS ARM64 (included in repo)
      - ./neo4j-mcp_Darwin_arm64/neo4j-mcp:/usr/local/bin/neo4j-mcp
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    command: >
      /usr/local/bin/neo4j-mcp
      --transport http
      --port 8787
      --host 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Cerberus FastAPI backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cerberus-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEO4J_MCP_URL=http://neo4j-mcp:8787
    depends_on:
      neo4j-mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend dev server ───────────────────────────────────────
  # React 18 + Vite + Tailwind + shadcn/ui
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cerberus-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      neo4j-mcp:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0
