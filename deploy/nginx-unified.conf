# ============================================================
# nginx config for the unified Cerberus container
# ============================================================
# Serves the React SPA static files and proxies /api/* and
# /health requests to the FastAPI backend running on
# localhost:8000. Since both share the same origin, there
# are zero CORS issues.
# ============================================================

server {
    # Listen on the PORT env var (Render sets this to 10000),
    # fall back to 80 for local Docker runs
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static asset caching ────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check (proxied to FastAPI) ───────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # ── SSE streaming endpoint (needs special proxy settings)
    location /api/query/stream {
        proxy_pass http://127.0.0.1:8000/api/query/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE requires HTTP/1.1 with no buffering
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        # Keep connection open for streaming (5 min timeout)
        proxy_read_timeout 300s;
    }

    # ── All other API requests ──────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback — all other paths serve index.html ─────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
