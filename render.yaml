# ============================================================
# render.yaml — Render Blueprint for Cerberus
# ============================================================
# Deploys 2 services:
#   1. neo4j-mcp — Private Service (internal only, bridges to Neo4j Aura)
#   2. cerberus  — Unified Web Service (nginx + FastAPI in one container)
#
# The unified container builds the React frontend at Docker build
# time, serves it via nginx, and proxies /api/* to uvicorn on
# localhost:8000. This eliminates CORS entirely (same origin).
#
# Neo4j runs externally on Aura free tier — not managed by Render.
#
# Setup:
#   1. Connect this repo in the Render dashboard
#   2. Create a Blueprint instance from this file
#   3. Fill in the env var values when prompted
#   4. Deploy
#
# Total cost: ~$7/month (one web service; neo4j-mcp can be removed
#   if you point NEO4J_MCP_URL to a public endpoint instead)
# ============================================================

services:
  # ── neo4j-mcp: Private Service (internal-only) ────────────
  # Bridges FastAPI backend to Neo4j Aura via MCP protocol.
  # Only accessible from other Render services over the private network.
  - type: pserv
    name: neo4j-mcp
    runtime: docker
    plan: starter
    dockerfilePath: ./neo4j-mcp_Linux_x86_64/Dockerfile
    dockerContext: ./neo4j-mcp_Linux_x86_64
    envVars:
      - key: NEO4J_URI
        sync: false

  # ── cerberus: Unified Web Service (frontend + backend) ────
  # Single container running nginx (static files + reverse proxy)
  # and uvicorn (FastAPI). No CORS needed — same origin.
  - type: web
    name: cerberus
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      # Neo4j Aura credentials
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      # LLM provider
      - key: ANTHROPIC_API_KEY
        sync: false
      # neo4j-mcp URL — resolved from the private service
      - key: NEO4J_MCP_URL
        fromService:
          name: neo4j-mcp
          type: pserv
          property: hostport
      # RocketRide (optional — falls back to direct LLM if unavailable)
      - key: ROCKETRIDE_URI
        sync: false
      - key: ROCKETRIDE_APIKEY
        sync: false
      - key: ROCKETRIDE_ANTHROPIC_KEY
        sync: false
      - key: NEO4J_MCP_ENDPOINT
        sync: false
      - key: ROCKETRIDE_NEO4J_BASIC_AUTH
        sync: false
    healthCheckPath: /health
