# ============================================================
# Cerberus — Docker Compose for local development & deployment
# ============================================================
# Services: neo4j-mcp bridge + FastAPI backend + React frontend
#
# Neo4j itself runs on Aura (cloud) — not in this compose file.
# The neo4j-mcp server bridges between the backend and Aura.
#
# Usage (dev):
#   cp .env.example .env  # fill in your Aura credentials
#   docker compose up --build
#
# Usage (production frontend):
#   docker compose --profile prod up --build
# ============================================================

services:
  # ── neo4j-mcp server ─────────────────────────────────────────
  # Bridges the FastAPI backend (and RocketRide) to Neo4j Aura.
  # Exposes tools: get-schema, read-cypher, write-cypher
  # Runs in HTTP mode (not stdio) so backend can reach it.
  neo4j-mcp:
    build:
      context: ./neo4j-mcp_Linux_arm64
      dockerfile: Dockerfile
    container_name: cerberus-neo4j-mcp
    ports:
      - "8787:8787"
    environment:
      # In HTTP mode, Neo4j credentials come per-request via Basic Auth.
      # Only NEO4J_URI is needed so the server knows where to connect.
      - NEO4J_URI=${NEO4J_URI}
    restart: unless-stopped
    healthcheck:
      # The MCP server only has a POST /mcp endpoint — no GET health path.
      # We check TCP connectivity to confirm the server is up and listening.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8787/mcp 2>&1 || wget -S -O /dev/null http://localhost:8787/mcp 2>&1 | grep -q '405'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Cerberus FastAPI backend ──────────────────────────────────
  # Build context is project root so requirements.txt is accessible.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cerberus-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEO4J_MCP_URL=http://neo4j-mcp:8787
      # RocketRide SDK (runs outside Docker by default; override URI for remote)
      - ROCKETRIDE_URI=${ROCKETRIDE_URI:-http://host.docker.internal:5565}
      - ROCKETRIDE_APIKEY=${ROCKETRIDE_APIKEY}
      - ROCKETRIDE_ANTHROPIC_KEY=${ROCKETRIDE_ANTHROPIC_KEY}
      # MCP endpoint that RocketRide's MCP Client node uses to reach neo4j-mcp.
      # Default: localhost:8787 (host-mapped port) since RocketRide engine
      # runs on the host, not inside Docker.
      - NEO4J_MCP_ENDPOINT=${NEO4J_MCP_ENDPOINT:-http://localhost:8787/mcp}
    depends_on:
      neo4j-mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend dev server ───────────────────────────────────────
  # React 18 + Vite + Tailwind + shadcn/ui (hot-reload via volume mount)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: cerberus-frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload; exclude node_modules
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
